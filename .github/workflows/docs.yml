name: Documentation Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'

jobs:
  lint-docs:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
